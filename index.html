<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Mind</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="copy-toast">COPIED ✓</div>

<!-- Sidebar overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">

  <!-- ── HISTORY SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">History</span>
      <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <div class="history-list" id="historyList"></div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">
    <header class="chat-header">
      <button class="history-toggle" onclick="toggleSidebar()" title="History">☰</button>

      <div class="header-center">
        <div class="header-title">Apex Mind</div>
        <div class="possession-bar"><div class="possession-fill" id="possessionFill"></div></div>
        <div class="header-subtitle" id="chatLabel">new session</div>
      </div>

      <div class="header-actions">
        <button class="hdr-btn" onclick="exportChat()" title="Export">↓ <span>Export</span></button>
        <button class="hdr-btn danger" onclick="clearCurrentChat()" title="Clear">✕ <span>Clear</span></button>
      </div>
    </header>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask Apex Mind anything…" autocomplete="off" />
      <button class="send-btn" id="sendBtn" onclick="askAI()">Send</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
